baseURL = "https://techdox.nz/"
languageCode = "en-nz"
timeZone = "Pacific/Auckland"
title = "Techdox"
enableRobotsTXT = true
enableEmoji = true
summaryLength = 28
[pagination]
  pagerSize = 10

[permalinks]
  posts = "/:slug/"

[params]
  description = "Self-hosting tutorials, homelab projects, and Cloudflare Zero Trust guides."
  author = "Nick Wilkinson"
  tagline = "Your fun and informative source for IT goodness."
  buttondown = "techdox"

[taxonomies]
  tag = "tags"

# "Keep reading" suggestions on posts — matched by shared tags
[related]
  threshold = 60
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100

# Top nav — mirrors the current Ghost site
[menu]
  [[menu.main]]
    name = "Deals"
    url = "/deals/"
    weight = 5
  [[menu.main]]
    name = "YouTube"
    url = "https://youtube.com/techdoxnz"
    weight = 10
  [[menu.main]]
    name = "Docs"
    url = "https://docs.techdox.nz/"
    weight = 20
  [[menu.main]]
    name = "Merch"
    url = "https://store.techdox.nz/"
    weight = 30
  [[menu.main]]
    name = "Support"
    url = "https://bmc.link/techdox"
    weight = 40

[markup]
  [markup.highlight]
    noClasses = true
    style = "github-dark"
    tabWidth = 2
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true

[services]
  [services.rss]
    limit = 20
