{{ define "main" }}
<header class="list-hero">
  <div class="kicker">$ ls <span class="dim">tags/</span></div>
  <h1 class="hero list">Tags</h1>
</header>
<div class="post-tags" style="border:none;padding:0;margin-top:10px">
  {{ range .Pages }}
    <a class="tag" href="{{ .RelPermalink }}">{{ .Title }} ({{ len .Pages }})</a>
  {{ end }}
</div>
{{ end }}
