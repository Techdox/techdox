apiVersion: apps/v1
kind: Deployment
metadata:
  name: techdox
  namespace: web
spec:
  replicas: 2
  selector:
    matchLabels: { app: techdox }
  template:
    metadata:
      labels: { app: techdox }
    spec:
      containers:
        - name: techdox
          image: REGISTRY_HOST/REPO:latest   # match your workflow tag
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
---
apiVersion: v1
kind: Service
metadata:
  name: techdox
  namespace: web
spec:
  selector: { app: techdox }
  ports: [{ port: 80, targetPort: 80 }]
