server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/rss+xml image/svg+xml;

  # fingerprinted assets are immutable
  location /css/ { expires 1y; add_header Cache-Control "public, immutable"; }

  location / { try_files $uri $uri/ =404; }
  error_page 404 /404.html;
}
