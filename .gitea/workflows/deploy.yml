name: build-and-publish
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest      # your Gitea Actions runner (needs docker)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}        # e.g. git.techdox.nz
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_REPO }}:latest
            ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_REPO }}:${{ github.sha }}

      # Option A - trigger a k8s rollout (uncomment; needs KUBECONFIG secret)
      # - name: Roll out
      #   run: kubectl -n web rollout restart deployment/techdox
